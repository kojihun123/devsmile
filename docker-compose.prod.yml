services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/public/storage:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${APP_DOMAIN:-devsmile.org}
    depends_on:
      - app
    networks:
      - devsmile

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - TZ=Asia/Seoul
    depends_on:
      - mysql
      - redis
    networks:
      - devsmile

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./storage:/var/www/html/storage
    command: php artisan queue:work redis --sleep=3 --tries=3
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - TZ=Asia/Seoul
    depends_on:
      - redis
    networks:
      - devsmile

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./storage:/var/www/html/storage
    command: php artisan schedule:work
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - TZ=Asia/Seoul
    depends_on:
      - mysql
      - redis
    networks:
      - devsmile

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-devsmile}
      MYSQL_USER: ${DB_USERNAME:-devsmile}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devsmile

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - devsmile

volumes:
  mysql_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  devsmile:
    driver: bridge
